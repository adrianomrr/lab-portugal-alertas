<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab-Portugal Alertas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root, [data-theme="light"] {
  --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
  --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
  --transition-interactive:180ms cubic-bezier(0.16,1,0.3,1);
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-surface-dynamic:#e6e4df;
  --color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-text-inverse:#f9f8f4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --color-fire:#c94a14;--color-fire-bg:#fdf3ef;--color-fire-border:#f4c9b5;
  --color-orange:#da7101;--color-orange-bg:#fdf6ec;--color-orange-border:#f5d9a8;
  --color-gold:#b88a00;--color-gold-bg:#fdfaec;--color-gold-border:#f0e0a0;
  --color-success:#437a22;--color-success-bg:#f0f7eb;--color-success-border:#bddda8;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);--shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --font-body:'Inter',system-ui,sans-serif;
}
[data-theme="dark"] {
  --color-bg:#141312;--color-surface:#1a1917;--color-surface-2:#1f1e1c;
  --color-surface-offset:#1c1b19;--color-surface-dynamic:#2a2927;
  --color-divider:#252422;--color-border:#353331;
  --color-text:#d0cec9;--color-text-muted:#787570;--color-text-faint:#504e4a;
  --color-text-inverse:#28251d;
  --color-primary:#4f98a3;
  --color-fire:#e8643a;--color-fire-bg:#2a1a12;--color-fire-border:#5c2d18;
  --color-orange:#fdab43;--color-orange-bg:#231a0d;--color-orange-border:#5c3f12;
  --color-gold:#e8c040;--color-gold-bg:#221d09;--color-gold-border:#5a4a14;
  --color-success:#6daa45;--color-success-bg:#131f0c;--color-success-border:#3a5a22;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.25);--shadow-md:0 4px 12px oklch(0 0 0/0.35);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --color-bg:#141312;--color-surface:#1a1917;--color-surface-2:#1f1e1c;
  --color-surface-offset:#1c1b19;--color-surface-dynamic:#2a2927;
  --color-divider:#252422;--color-border:#353331;
  --color-text:#d0cec9;--color-text-muted:#787570;--color-text-faint:#504e4a;
  --color-text-inverse:#28251d;--color-primary:#4f98a3;
  --color-fire:#e8643a;--color-fire-bg:#2a1a12;--color-fire-border:#5c2d18;
  --color-orange:#fdab43;--color-orange-bg:#231a0d;--color-orange-border:#5c3f12;
  --color-gold:#e8c040;--color-gold-bg:#221d09;--color-gold-border:#5a4a14;
  --color-success:#6daa45;--color-success-bg:#131f0c;--color-success-border:#3a5a22;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.25);--shadow-md:0 4px 12px oklch(0 0 0/0.35);
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth;}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
a,button{transition:color var(--transition-interactive),background var(--transition-interactive),border-color var(--transition-interactive);}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

.app{display:flex;flex-direction:column;min-height:100dvh;}

header{
  position:sticky;top:0;z-index:100;
  background:var(--color-surface);border-bottom:1px solid var(--color-border);
  padding:var(--space-3) var(--space-6);
  display:flex;align-items:center;justify-content:space-between;gap:var(--space-4);
  box-shadow:var(--shadow-sm);
}
.logo{display:flex;align-items:center;gap:var(--space-3);text-decoration:none;color:var(--color-text);}
.logo-icon{color:var(--color-fire);}
.logo-text{font-size:var(--text-lg);font-weight:700;letter-spacing:-0.02em;}
.logo-sub{font-size:var(--text-xs);color:var(--color-text-muted);font-weight:400;}
.header-right{display:flex;align-items:center;gap:var(--space-3);}
.last-update{font-size:var(--text-xs);color:var(--color-text-muted);}
.theme-btn{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);border:1px solid var(--color-border);}
.theme-btn:hover{color:var(--color-text);background:var(--color-surface-offset);}

.tabs-bar{background:var(--color-surface);border-bottom:1px solid var(--color-border);padding:0 var(--space-6);display:flex;overflow-x:auto;}
.tab-btn{padding:var(--space-3) var(--space-5);font-size:var(--text-sm);font-weight:500;color:var(--color-text-muted);border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:var(--space-2);}
.tab-btn:hover{color:var(--color-text);}
.tab-btn.active{color:var(--color-text);border-bottom-color:var(--color-fire);}
.tab-badge{font-size:var(--text-xs);font-weight:600;padding:1px 6px;border-radius:var(--radius-full);background:var(--color-surface-dynamic);color:var(--color-text-muted);min-width:20px;text-align:center;}
.tab-badge.active-fires{background:var(--color-fire);color:#fff;}

main{flex:1;padding:var(--space-6);max-width:1400px;margin:0 auto;width:100%;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:var(--space-4);margin-bottom:var(--space-6);}
.kpi-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-4);box-shadow:var(--shadow-sm);}
.kpi-label{font-size:var(--text-xs);color:var(--color-text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:var(--space-2);}
.kpi-value{font-size:var(--text-xl);font-weight:700;font-variant-numeric:tabular-nums;}
.kpi-value.fire-red{color:var(--color-fire);}
.kpi-value.fire-orange{color:var(--color-orange);}
.kpi-value.fire-gold{color:var(--color-gold);}

/* FIRES LAYOUT */
.fires-layout{display:grid;grid-template-columns:1fr 340px;gap:var(--space-6);height:580px;}
@media(max-width:900px){.fires-layout{grid-template-columns:1fr;height:auto;}}
#fire-map{border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--color-border);min-height:340px;}
.fires-list{overflow-y:auto;display:flex;flex-direction:column;gap:var(--space-3);}
.fire-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-4);box-shadow:var(--shadow-sm);}
.fire-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-2);margin-bottom:var(--space-2);}
.fire-location{font-size:var(--text-sm);font-weight:600;display:flex;align-items:center;gap:var(--space-1);}
.fire-status-badge{font-size:var(--text-xs);font-weight:600;padding:2px 8px;border-radius:var(--radius-full);white-space:nowrap;flex-shrink:0;}
.status-em-curso{background:var(--color-fire-bg);color:var(--color-fire);border:1px solid var(--color-fire-border);}
.status-em-resolucao{background:var(--color-orange-bg);color:var(--color-orange);border:1px solid var(--color-orange-border);}
.status-vigilancia{background:var(--color-gold-bg);color:var(--color-gold);border:1px solid var(--color-gold-border);}
.status-despacho{background:var(--color-success-bg);color:var(--color-success);border:1px solid var(--color-success-border);}
.fire-meta{font-size:var(--text-xs);color:var(--color-text-muted);display:flex;flex-wrap:wrap;gap:var(--space-1) var(--space-3);margin-top:var(--space-1);}
.pulse-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--color-fire);flex-shrink:0;animation:pulse-fire 1.5s ease-in-out infinite;}
@keyframes pulse-fire{0%,100%{opacity:1;box-shadow:0 0 0 0 oklch(.55 .2 35/.4);}50%{opacity:.8;box-shadow:0 0 0 5px oklch(.55 .2 35/0);}}
.empty-state{text-align:center;padding:var(--space-12) var(--space-8);color:var(--color-text-muted);}
.empty-state h3{color:var(--color-text);margin-bottom:var(--space-2);font-size:var(--text-lg);}

/* METEO */
.meteo-controls{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-6);flex-wrap:wrap;}
.meteo-controls label{font-size:var(--text-sm);color:var(--color-text-muted);font-weight:500;}
.select-input{padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text);font:inherit;font-size:var(--text-sm);cursor:pointer;}
.select-input:focus{outline:2px solid var(--color-primary);outline-offset:2px;}
.forecast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:var(--space-4);}
.forecast-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-5);text-align:center;box-shadow:var(--shadow-sm);}
.forecast-day{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--color-text-muted);margin-bottom:var(--space-3);}
.forecast-icon{font-size:2rem;line-height:1;margin-bottom:var(--space-3);}
.forecast-temps{display:flex;justify-content:center;gap:var(--space-3);margin-bottom:var(--space-2);}
.forecast-max{font-weight:700;font-size:var(--text-base);}
.forecast-min{color:var(--color-text-muted);font-size:var(--text-sm);align-self:flex-end;}
.forecast-rain{font-size:var(--text-xs);color:var(--color-primary);}
.forecast-desc{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:var(--space-1);}

/* ALERTAS */
.section-heading{font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4);display:flex;align-items:center;gap:var(--space-2);}
.alertas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--space-4);margin-bottom:var(--space-8);}
.alerta-card{border-radius:var(--radius-lg);padding:var(--space-5);box-shadow:var(--shadow-sm);}
.alerta-card.red{background:var(--color-fire-bg);border:1px solid var(--color-fire-border);}
.alerta-card.orange{background:var(--color-orange-bg);border:1px solid var(--color-orange-border);}
.alerta-card.yellow{background:var(--color-gold-bg);border:1px solid var(--color-gold-border);}
.alerta-card.green{background:var(--color-success-bg);border:1px solid var(--color-success-border);}
.alerta-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-2);}
.alerta-tipo{font-size:var(--text-sm);font-weight:700;}
.alerta-card.red .alerta-tipo{color:var(--color-fire);}
.alerta-card.orange .alerta-tipo{color:var(--color-orange);}
.alerta-card.yellow .alerta-tipo{color:var(--color-gold);}
.alerta-card.green .alerta-tipo{color:var(--color-success);}
.alerta-nivel{font-size:var(--text-xs);font-weight:700;padding:2px 8px;border-radius:var(--radius-full);text-transform:uppercase;letter-spacing:.05em;}
.alerta-card.red .alerta-nivel{background:var(--color-fire);color:#fff;}
.alerta-card.orange .alerta-nivel{background:var(--color-orange);color:#fff;}
.alerta-card.yellow .alerta-nivel{background:var(--color-gold);color:#fff;}
.alerta-card.green .alerta-nivel{background:var(--color-success);color:#fff;}
.alerta-local{font-size:var(--text-base);font-weight:600;margin-bottom:var(--space-1);}
.alerta-periodo{font-size:var(--text-xs);color:var(--color-text-muted);}

/* RISCO */
.risco-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:var(--space-3);}
.risco-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-4);display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-sm);}
.risco-distrito{font-size:var(--text-sm);font-weight:600;}
.risco-badge{font-size:var(--text-xs);font-weight:700;padding:2px 10px;border-radius:var(--radius-full);text-transform:uppercase;}
.risco-1{background:var(--color-success-bg);color:var(--color-success);border:1px solid var(--color-success-border);}
.risco-2{background:var(--color-gold-bg);color:var(--color-gold);border:1px solid var(--color-gold-border);}
.risco-3{background:var(--color-orange-bg);color:var(--color-orange);border:1px solid var(--color-orange-border);}
.risco-4{background:var(--color-fire-bg);color:var(--color-fire);border:1px solid var(--color-fire-border);}
.risco-5{background:#ffeaea;color:#8b0000;border:1px solid #ffb0a0;}
[data-theme="dark"] .risco-5{background:#2d0d05;color:#ff6644;border:1px solid #7a2010;}

/* SKELETON */
.skeleton{border-radius:var(--radius-md);background:linear-gradient(90deg,var(--color-surface-offset) 25%,var(--color-surface-dynamic) 50%,var(--color-surface-offset) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

@media(max-width:640px){
  main{padding:var(--space-4);}
  header{padding:var(--space-3) var(--space-4);}
  .tabs-bar{padding:0 var(--space-4);}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <a href="#" class="logo">
      <svg class="logo-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" aria-label="Fogo">
        <path d="M12 2C8 7 6 9.5 6 13a6 6 0 0 0 12 0c0-3.5-2-6-6-11z" fill="currentColor" opacity=".9"/>
        <path d="M12 8c-1.5 2.5-2 4-2 5a2 2 0 0 0 4 0c0-1-.5-2.5-2-5z" fill="white" opacity=".5"/>
      </svg>
      <div>
        <div class="logo-text">Lab-Portugal Alertas</div>
        <div class="logo-sub">Lab-Meteorologia &amp; Incêndios</div>
      </div>
    </a>
    <div class="header-right">
      <span class="last-update" id="last-update">A carregar…</span>
      <button class="theme-btn" data-theme-toggle aria-label="Alternar tema">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <nav class="tabs-bar" role="tablist">
    <button class="tab-btn active" role="tab" aria-selected="true" data-tab="incendios">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8 7 6 9.5 6 13a6 6 0 0 0 12 0c0-3.5-2-6-6-11z"/></svg>
      Incêndios <span class="tab-badge" id="badge-incendios">0</span>
    </button>
    <button class="tab-btn" role="tab" aria-selected="false" data-tab="meteo">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      Meteorologia
    </button>
    <button class="tab-btn" role="tab" aria-selected="false" data-tab="alertas">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
      Avisos IPMA <span class="tab-badge" id="badge-alertas">0</span>
    </button>
    <button class="tab-btn" role="tab" aria-selected="false" data-tab="risco">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Risco Incêndio
    </button>
  </nav>

  <main>
    <div class="tab-panel active" id="panel-incendios">
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">Em Curso</div><div class="kpi-value fire-red" id="kpi-curso"><div class="skeleton" style="height:2rem;width:3rem;border-radius:var(--radius-sm);"></div></div></div>
        <div class="kpi-card"><div class="kpi-label">Em Resolução</div><div class="kpi-value fire-orange" id="kpi-resolucao"><div class="skeleton" style="height:2rem;width:3rem;border-radius:var(--radius-sm);"></div></div></div>
        <div class="kpi-card"><div class="kpi-label">Vigilância</div><div class="kpi-value fire-gold" id="kpi-vigilancia"><div class="skeleton" style="height:2rem;width:3rem;border-radius:var(--radius-sm);"></div></div></div>
        <div class="kpi-card"><div class="kpi-label">Total Ativo</div><div class="kpi-value" id="kpi-total"><div class="skeleton" style="height:2rem;width:3rem;border-radius:var(--radius-sm);"></div></div></div>
      </div>
      <div class="fires-layout">
        <div id="fire-map"></div>
        <div class="fires-list" id="fires-list">
          <div class="skeleton" style="height:90px;"></div>
          <div class="skeleton" style="height:90px;margin-top:var(--space-3);"></div>
          <div class="skeleton" style="height:90px;margin-top:var(--space-3);"></div>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="panel-meteo">
      <div class="meteo-controls">
        <label for="concelho-select">Concelho:</label>
        <select class="select-input" id="concelho-select"></select>
      </div>
      <div class="forecast-grid" id="forecast-grid">
        <div class="skeleton" style="height:160px;"></div>
        <div class="skeleton" style="height:160px;"></div>
        <div class="skeleton" style="height:160px;"></div>
        <div class="skeleton" style="height:160px;"></div>
        <div class="skeleton" style="height:160px;"></div>
      </div>
    </div>

    <div class="tab-panel" id="panel-alertas">
      <div id="alertas-container">
        <div class="skeleton" style="height:100px;margin-bottom:var(--space-3);"></div>
        <div class="skeleton" style="height:100px;"></div>
      </div>
    </div>

    <div class="tab-panel" id="panel-risco">
      <h2 class="section-heading">Risco de Incêndio por Distrito</h2>
      <div class="risco-grid" id="risco-grid">
        <div class="skeleton" style="height:56px;"></div>
        <div class="skeleton" style="height:56px;"></div>
        <div class="skeleton" style="height:56px;"></div>
      </div>
    </div>
  </main>
</div>

<script>
(function(){
  const btn = document.querySelector('[data-theme-toggle]');
  const root = document.documentElement;
  let theme = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  root.setAttribute('data-theme', theme);
  const sun = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  const moon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  if (btn) {
    btn.innerHTML = theme === 'dark' ? sun : moon;
    btn.addEventListener('click', () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', theme);
      btn.innerHTML = theme === 'dark' ? sun : moon;
    });
  }
})();

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    btn.setAttribute('aria-selected','true');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'incendios') setTimeout(() => fireMap && fireMap.invalidateSize(), 60);
  });
});

let fireMap = null, fireMarkers = [];

function initMap() {
  fireMap = L.map('fire-map', { zoomControl: true }).setView([39.5, -8.0], 6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(fireMap);
}

function getStatusClass(status) {
  const s = (status||'').toLowerCase();
  if (s.includes('curso')) return 'em-curso';
  if (s.includes('resolu')) return 'em-resolucao';
  if (s.includes('vigil')) return 'vigilancia';
  return 'despacho';
}

function getStatusColor(status) {
  const s = (status||'').toLowerCase();
  if (s.includes('curso')) return '#c94a14';
  if (s.includes('resolu')) return '#da7101';
  if (s.includes('vigil')) return '#b88a00';
  return '#437a22';
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 60000);
  if (diff < 1) return 'agora';
  if (diff < 60) return `há ${diff} min`;
  const h = Math.floor(diff/60);
  if (h < 24) return `há ${h}h`;
  return `há ${Math.floor(h/24)}d`;
}

async function loadFires() {
  try {
    const res = await fetch('https://api.fogos.pt/v2/incidents/active');
    const data = await res.json();
    const fires = data.data || [];

    const curso = fires.filter(f => (f.status||'').toLowerCase().includes('curso')).length;
    const resolucao = fires.filter(f => (f.status||'').toLowerCase().includes('resolu')).length;
    const vigilancia = fires.filter(f => (f.status||'').toLowerCase().includes('vigil')).length;

    document.getElementById('kpi-curso').textContent = curso;
    document.getElementById('kpi-resolucao').textContent = resolucao;
    document.getElementById('kpi-vigilancia').textContent = vigilancia;
    document.getElementById('kpi-total').textContent = fires.length;

    const badge = document.getElementById('badge-incendios');
    badge.textContent = fires.length;
    badge.classList.toggle('active-fires', curso > 0);

    fireMarkers.forEach(m => fireMap.removeLayer(m));
    fireMarkers = [];

    fires.forEach(f => {
      const lat = parseFloat(f.lat), lng = parseFloat(f.lng || f.lon);
      if (!isNaN(lat) && !isNaN(lng)) {
        const color = getStatusColor(f.status);
        const icon = L.divIcon({
          className:'',
          html:`<div style="width:13px;height:13px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 6px ${color}99;"></div>`,
          iconSize:[13,13],
          iconAnchor:[6,6]
        });
        const m = L.marker([lat,lng],{icon})
          .bindPopup(`<b>${f.location||f.concelho||'—'}</b><br>${f.distrito||''}<br><span style="color:${color};font-weight:600;">${f.status||''}</span><br>Terrestres: ${f.meiosTerrestes||0} | Aéreos: ${f.meiosAereos||0}`)
          .addTo(fireMap);
        fireMarkers.push(m);
      }
    });

    const list = document.getElementById('fires-list');
    if (fires.length === 0) {
      list.innerHTML = `<div class="empty-state"><p style="font-size:3rem;margin-bottom:var(--space-4)">🌿</p><h3>Sem incêndios ativos</h3><p>Não há ocorrências registadas neste momento.</p></div>`;
    } else {
      list.innerHTML = fires.map(f => {
        const sc = getStatusClass(f.status);
        return `<div class="fire-card">
          <div class="fire-card-header">
            <div class="fire-location">
              ${sc==='em-curso' ? '<span class="pulse-dot"></span>' : ''}
              ${f.location||f.concelho||'Desconhecido'}
            </div>
            <span class="fire-status-badge status-${sc}">${f.status||'—'}</span>
          </div>
          <div class="fire-meta">
            <span>${f.distrito||'—'}</span>
            ${f.meiosTerrestes ? `<span>🚒 ${f.meiosTerrestes}</span>` : ''}
            ${f.meiosAereos ? `<span>🚁 ${f.meiosAereos}</span>` : ''}
            <span>${timeAgo(f.dateTime||f.updateTime)}</span>
          </div>
        </div>`;
      }).join('');
    }

    document.getElementById('last-update').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-PT');
  } catch (e) {
    document.getElementById('fires-list').innerHTML = '<div class="empty-state"><h3>Erro ao carregar dados</h3><p>Verifique a ligação à internet.</p></div>';
  }
}

function populateSelect() {
  const sel = document.getElementById('concelho-select');
  concelhos.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.nome;
    sel.appendChild(opt);
  });
  sel.value = 1061100;
  sel.addEventListener('change', () => loadMeteo(parseInt(sel.value)));
  loadMeteo(1061100);
}

async function loadMeteo(globalIdLocal) {
  const grid = document.getElementById('forecast-grid');
  grid.innerHTML = [1,2,3,4,5].map(() => `<div class="skeleton" style="height:160px;"></div>`).join('');
  try {
    const res = await fetch(`https://api.ipma.pt/open-data/forecast/meteorology/cities/daily/${globalIdLocal}.json`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const days = (json.data || []).slice(0, 5);
    if (!days.length) throw new Error('sem dados');

    grid.innerHTML = days.map(day => {
      const date = new Date(day.forecastDate + 'T12:00:00');
      const dow = diasSemana[date.getDay()];
      const dayNum = date.getDate();
      const mon = date.getMonth() + 1;
      const wid = day.idWeatherType;
      const [icon, desc] = ipmaIcons[wid] || ['🌡️','—'];
      const tMax = day.tMax != null ? Math.round(day.tMax) + '°' : '—';
      const tMin = day.tMin != null ? Math.round(day.tMin) + '°' : '—';
      const rain = day.precipitaProb != null ? day.precipitaProb + '%' : '—';

      return `<div class="forecast-card">
        <div class="forecast-day">${dow} ${dayNum}/${mon}</div>
        <div class="forecast-icon">${icon}</div>
        <div class="forecast-temps">
          <span class="forecast-max">${tMax}</span>
          <span class="forecast-min">${tMin}</span>
        </div>
        <div class="forecast-rain">💧 ${rain}</div>
        <div class="forecast-desc">${desc}</div>
      </div>`;
    }).join('');
  } catch (e) {
    grid.innerHTML = `<p style="color:var(--color-text-muted);grid-column:1/-1;padding:var(--space-8);">Erro ao carregar previsão. (${e.message})</p>`;
  }
}

async function loadAlertas() {
  try {
    const res = await fetch('https://api.ipma.pt/open-data/forecast/warnings/warnings_www.json');
    const data = await res.json();
    const now = new Date();
    const active = data.filter(a => new Date(a.endTime) > now)
      .sort((a,b) => {
        const order = {red:0,orange:1,yellow:2,green:3};
        return (order[a.awarenessLevelID]??4) - (order[b.awarenessLevelID]??4);
      });

    const nonGreen = active.filter(a => a.awarenessLevelID !== 'green').length;
    document.getElementById('badge-alertas').textContent = nonGreen;
    if (nonGreen > 0) document.getElementById('badge-alertas').classList.add('active-fires');

    const container = document.getElementById('alertas-container');
    if (!active.length) {
      container.innerHTML = '<div class="empty-state"><p style="font-size:3rem;margin-bottom:var(--space-4)">✅</p><h3>Sem avisos activos</h3><p>Não existem avisos meteorológicos activos.</p></div>';
      return;
    }

    const byType = {};
    active.forEach(a => {
      const key = a.awarenessTypeName || 'Geral';
      if (!byType[key]) byType[key] = [];
      byType[key].push(a);
    });

    const lvlLabel = {red:'Vermelho',orange:'Laranja',yellow:'Amarelo',green:'Verde'};
    const lvlOrder = {red:0,orange:1,yellow:2,green:3};

    container.innerHTML = Object.entries(byType).map(([tipo, items]) => {
      const sorted = items.sort((a,b) => (lvlOrder[a.awarenessLevelID]??4) - (lvlOrder[b.awarenessLevelID]??4));
      return `<div>
        <h2 class="section-heading">${tipo}</h2>
        <div class="alertas-grid">${sorted.map(a => `
          <div class="alerta-card ${a.awarenessLevelID}">
            <div class="alerta-header">
              <span class="alerta-tipo">${a.awarenessTypeName||tipo}</span>
              <span class="alerta-nivel">${lvlLabel[a.awarenessLevelID]||a.awarenessLevelID}</span>
            </div>
            <div class="alerta-local">${a.area||a.idAreaAviso||'—'}</div>
            <div class="alerta-periodo">
              ${new Date(a.startTime).toLocaleString('pt-PT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}
              → ${new Date(a.endTime).toLocaleString('pt-PT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}
            </div>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('alertas-container').innerHTML = '<p style="color:var(--color-text-muted)">Erro ao carregar avisos.</p>';
  }
}

const riscoLabels = {1:'Reduzido',2:'Moderado',3:'Elevado',4:'Mto Elevado',5:'Máximo'};

async function loadRisco() {
  try {
    const res = await fetch('https://api.ipma.pt/open-data/forecast/fire-risk/risco-incendio-diario.json');
    const data = await res.json();
    const today = data.data?.[0]?.lstLocalData;
    if (!today) throw new Error('sem dados');
    const sorted = [...today].sort((a,b) => (b.iRCM||0) - (a.iRCM||0));

    document.getElementById('risco-grid').innerHTML = sorted.map(d => {
      const level = Math.min(5, Math.max(1, Math.round(d.iRCM)||1));
      return `<div class="risco-card">
        <span class="risco-distrito">${d.local||d.dico||'—'}</span>
        <span class="risco-badge risco-${level}">${riscoLabels[level]}</span>
      </div>`;
    }).join('');
  } catch (e) {
    const distritos = ['Aveiro','Beja','Braga','Bragança','C. Branco','Coimbra','Évora','Faro','Guarda','Leiria','Lisboa','Portalegre','Porto','Santarém','Setúbal','V. do Castelo','Vila Real','Viseu'];
    document.getElementById('risco-grid').innerHTML = distritos.map(d =>
      `<div class="risco-card"><span class="risco-distrito">${d}</span><span class="risco-badge risco-1">—</span></div>`
    ).join('');
  }
}
